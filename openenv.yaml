name: smart-meeting-room-openenv
version: 1.0.0

environment:
  entry_point: env.environment:MeetingRoomEnv

tasks:
  - id: task_easy
    description: Select a room based on capacity
    difficulty: easy
    grader: tasks.task_easy:grader

  - id: task_medium
    description: Select a room based on capacity and equipment
    difficulty: medium
    grader: tasks.task_medium:grader

  - id: task_hard
    description: Select a room based on multiple constraints
    difficulty: hard
    grader: tasks.task_hard:grader

metadata:
  author: your-name
  description: >
    A real-world OpenEnv environment for meeting room allocation.
    The agent must select the most appropriate room based on capacity,
    equipment, accessibility, and preferences while minimizing resource waste.